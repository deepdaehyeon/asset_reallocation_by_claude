# dry-run 또는 계좌 조회 실패 시 사용할 KRW/USD 비율 폴백
account_ratio_fallback:
  usd: 0.30
  krw: 0.70

# ── 자산군별 최대 비중 상한 ──────────────────────────────────────────────────
# 레짐 블렌딩으로 인한 과집중 방지. 초과분은 cash로 이동.
# 누락 자산군 (의도):
#   equity_etf, bond_krw, bond_usd, cash — 흡수 자산이라 cap 두면 USD 부족 흡수 경로가 막힘
class_max_weight:
  equity_factor:     0.10   # VTV+AVUV — Reflation·Stagflation 8%가 최대, +2pp 여유
  equity_sector:     0.10   # 218420 — Reflation 7%가 최대, +3pp 여유
  equity_individual: 0.20   # Satellite 20% 상한 (4종목 분산으로 종목당 5~6%)
  equity_developed:  0.05   # VEA — 글로벌 분산, 작은 비중 유지
  equity_emerging:   0.03   # VWO — 신흥국, 더 작은 비중
  commodity:         0.20   # DBC — Stagflation 20%가 최대
  managed_futures:   0.12   # DBMF — 횡보장 약점 고려
  bond_tips:         0.10   # 468370 — Stagflation 8%가 최대, 약간의 여유
  gold:              0.18   # 전천후 헤지 — 과대 비중 방지

# ── 변동성 타겟팅 ────────────────────────────────────────────────────────────
# portfolio EWMA vol 기반 (SPY realized vol 아님)
# regime_target_vol: 레짐별 목표 변동성 (레짐 미지정 시 target_vol 사용)
# floor: 최소 equity 유지율 (1.0 - floor = 최대 축소율)
vol_targeting:
  enabled: true
  target_vol:  0.10        # 레짐 미지정 시 기본값
  regime_target_vol:
    Goldilocks:  0.13      # 성장 국면: 리스크 허용도 높음
    Reflation:   0.11
    Slowdown:    0.09
    Stagflation: 0.08
    Crisis:      0.06      # 위기 국면: 리스크 최소화
  use_portfolio_vol: true  # true: EWMA 포트폴리오 변동성 / false: SPY realized vol
  ewma_lambda: 0.94        # RiskMetrics 표준 λ
  floor:       0.65        # equity 최대 35% 축소 — 레짐 사다리 스윕에서 4지표 전항목 우위 (2026-06-13, ladder f65 dominant)
  equity_asset_classes:
    - equity_etf
    - equity_factor
    - equity_sector
    - equity_individual
    - equity_developed
    - equity_emerging

# core+satellite: 자산의 core_ratio만큼을 고정 레짐(core_regime) 비중으로 묶고,
# 나머지를 현행 엔진(레짐 블렌드+vol타겟)으로 운용한다. 고정 코어는 매일 거래를 안 만들어
# 라이브 churn을 줄이고, 회복 구간에 풀로 참여해 underwater 기간을 단축한다.
# 채택 근거·스윕: docs/experiment_2026-06-12_core_satellite.md (고정 4지표 기준 core30 채택).
core_satellite:
  enabled: true
  core_ratio: 0.30          # 코어(Goldilocks 고정) 비중 — 4지표 종합 스윗스팟
  core_regime: Goldilocks   # 코어로 고정할 레짐

# HMM + RF 앙상블 레짐 모델
hmm:
  enabled: true
  lookback_days: 500       # HMM 학습 윈도우 (거래일)
  predict_lookback: 60     # 추론 시 사용할 시퀀스 길이 — 전이 확률 문맥 반영
  min_samples: 100
  # 공분산 floor (GaussianHMM min_covar) — 표준화 데이터 기준.
  #   1e-3 (현재) — 매우 작음 → 방출 뾰족 → 사후확률 0/100 포화 (단일 HMM 휘프소 원인)
  #   0.05~0.25 — floor를 올려 방출을 넓힘 → 여러 상태가 확률 분담(포화 완화)
  #   docs/experiment_2026-06-09_hmm_min_covar.md 검증 후 값 결정.
  min_covar: 0.001
  # override_threshold 0.60 → 0.50: HMM/RF 다수결을 더 빠르게 채택
  # Crisis 진입 후 21일 +0.06% → -0.30% (후행에서 적시로 회복).
  override_threshold: 0.50
  # Crisis 비대칭 우선:
  #   0.40 (현재) — blend[Crisis] >= 0.40이면 즉시 Crisis. crisis_d 168 → 281일.
  #   0.30 — 더 적극적 (crisis_d 319일, 운영 부담↑).
  #   null  — 비활성.
  crisis_priority_threshold: 0.40
  # HMM 1-step ahead 예측 사용 (transition matrix로 next-step 분포):
  #   false — 마지막 시점 사후 확률 (기존)
  #   true  — transition 적용한 next-step 분포 (forward 시그널)
  use_forward_hmm: false
  forward_hmm_horizon: 1
  rf_enabled: true         # BalancedRF 앙상블 (소수 레짐 탐지 보강)
  rf_weight: 0.40          # RF 확률 가중치 (HMM 0.6 + RF 0.4)
  # RF 라벨링 방식:
  #   rf_forward_window=0 (기본): 동일 시점의 detect_regime() 라벨 — 룰의 근사기 (자기참조)
  #   rf_forward_window=N>0 + rf_label_mode='rule_at_future':
  #     t+N 시점의 detect_regime() 라벨 — forward-looking, 자기참조 끊김(룰 임계 그대로)
  #   rf_forward_window=N>0 + rf_label_mode='quantile':
  #     t+N 시점의 (momentum_1m, realized_vol) 학습 분포 분위 매핑 — detect_regime 호출 없음
  # 활성화 전 scripts/compare_rf_label.py로 백테스트 비교 권장.
  rf_forward_window: 0
  rf_label_mode: rule_at_future   # rule_at_future | quantile
  # state→regime 매핑 방식:
  #   true (기본): HMM state별 피처 통계로 비지도 매핑 (detect_regime 자기참조 제거)
  #                매핑이 ambiguous하면 legacy로 자동 폴백
  #   false      : legacy detect_regime 다수결 매핑만 사용
  unsupervised_mapping: true
  # label-switching 억제: 매 실행 HMM 재학습 시 새 state 군집을 직전 실행(anchor)에
  #   1:1 매칭해 라벨을 물려준다. 데이터가 거의 안 변했으면(정규화 거리 ≤ deadband)
  #   직전 라벨 유지 → Goldilocks↔Slowdown 가짜 플립 차단. 군집이 크게 이동했을 때만
  #   새 비지도 라벨 채택. Crisis는 정렬 제외(위기 감지 보존).
  stabilize_mapping: true
  # 군집 중심 정규화 거리(피처 std 단위 RMS) 임계. sweep(2010-2025) 결과 0.3이 sweet spot:
  #   Sharpe +0.053·Calmar +0.033·리밸/비용↓ 이면서 MaxDD/COVID/Bear22 사실상 불변(±0.07pp).
  #   db≥0.5는 진짜 방어 전환까지 얼려 위기 낙폭 악화(MaxDD -1.3pp+) → 리스크 회피 목표에 역행.
  mapping_deadband: 0.3
  # Crisis state 식별 임계 — 룰 기반 detect_regime의 rvol>0.30과 통일.
  # state 평균 realized_vol이 threshold 이상이거나, 2위 state 대비 ratio배 이상 높을 때만 Crisis.
  crisis_rvol_threshold: 0.30
  crisis_rvol_ratio: 1.5
  # _unsupervised_state_mapping에서 growth_score / infl_score 합성에 쓰는 가중치.
  # 가중치를 외부화한 이유: mom1m(±0.05 스케일) 대비 curve(±2 스케일)·vix(±20 스케일)가
  # 그대로면 한쪽이 점수를 지배 → 캘리브레이션 가능하도록 노출.
  mapping_weights:
    growth_curve:     0.01   # (curve_10y2y - 0.5) * w  → 가파른 커브 가중
    infl_commodity:   1.0    # commodity_mom_1m 가중 (그대로)
    infl_hy_zscore:   0.03   # hy_spread_zscore * w
    infl_cpi:         0.01   # (cpi_yoy - 2.0) * w
    infl_vix:         0.005  # (vix - 20.0) * w   (기존 1/200 = 0.005)

# 이상 탐지 (Option C — detect_regime 자기참조 없는 독립 신호)
# IsolationForest로 현재 시장이 학습 분포에서 얼마나 벗어났는지 측정.
# 높은 anomaly_score → 레짐 신뢰도 하향 → confidence_threshold(0.40) 미달 시 이전 확정 레짐 유지.
anomaly:
  enabled: true
  contamination: 0.05          # IsolationForest 가정 이상치 비율 (학습 시)
  confidence_penalty: 0.5      # anomaly=1.0일 때 신뢰도를 50% 깎음 (선형 감쇠)

# 레짐 전환 히스테리시스 필터 (표시·알림 목적 — 실제 비중은 연속 블렌딩 적용)
# 신뢰도 미달 시 폴백 정책: 이전 확정 레짐(state.confirmed_regime)을 유지하고,
# 초기 실행 등 이전 레짐이 없을 때만 DEFAULT_REGIME(Slowdown)로 폴백.
# 이유: 항상 Slowdown 폴백은 강세장 초입에서 신뢰도가 낮을 때 기회를 놓치는 체계적 편향.
regime_filter:
  # confirmation_count 2 → 1 (R3, 2026-05-30): 히스테리시스가 vol_targeting 방어 티어
  #   전환을 지연시켜 위험 구간 초입 risk timing 악화. 백테스트(2010-2025) cf2→cf1로
  #   Sharpe 0.713→0.753, MaxDD -11.35%→-10.24%. 확정 레짐은 vol 티어만 건드리고 비중은
  #   blend_probs(평활)가 결정하므로 flip-flop 위험 제한적. docs/experiment_2026-05-30_r3_whipsaw_layers.md
  # cooldown_days 5 → 0: 매매 쿨다운(min_rebalance_interval_days=7)이 binding이라 무의미.
  confirmation_count: 1
  cooldown_days: 0
  # acting regime 타이밍 소스 (층 2, 2026-05-31): rule이 ensemble final보다 +3~5d 빠른
  #   위험레짐 진입. 백테스트(2010-2025) rule-timing이 current 대비 Sharpe +0.063·MaxDD
  #   +0.64pp·Calmar +0.109, 서브기간 6/6 ΔSharpe>0. blend_probs는 항상 HMM 유지(낙폭 억제).
  #   유일 약점 = COVID급 격렬 V자 폭락(현행 히스테리시스 미세 우위). recall@10%는 현행 우위.
  #   docs/experiment_2026-05-31_regime_timing_layer2.md
  #   ensemble — rule을 HMM/RF 앙상블이 override (기존)
  #   rule     — rule_regime을 그대로 acting regime으로 (현재)
  regime_timing_source: rule
  # confidence_threshold: confidence_method 스케일에 맞춰야 한다.
  #   mean  : 0.40 (기존). 비단조 산식이므로 실제 캘리브레이션 의미 약함.
  #   min   : 0.20 (현재). mean 0.40과 동등한 fallback 비율(~39%) 유지.
  #   product: 0.10 권장 (multiplicative라 더 낮은 임계 필요).
  confidence_threshold: 0.20
  # 신뢰도 결합 산식 (외부 비평 #4):
  #   mean    — (rule_conf + hmm_conf) / 2  (Spearman ρ -0.325, 비단조)
  #   min     — min(rule_conf, hmm_conf)    (ρ +0.595, 단조 회복) ← 현재
  #   product — rule_conf * hmm_conf        (ρ +0.681, 가장 강한 단조)
  confidence_method: min
  # blend_probs EWMA 평활 (외부 비평 #6-c whipsaw 억제):
  #   new_blend = α · prev_blend + (1-α) · raw_blend
  #   0    — 평활 없음
  #   0.5  — 약한 평활 ← 현재 (whipsaw 57.6→47.3%, Sharpe -0.013, MaxDD -1.18pp)
  #   0.7~0.9 — 강한 평활 (MaxDD 악화 폭이 커짐 — 보류)
  blend_smoothing_alpha: 0.5
  # 신뢰도 가변 평활 (옵트인): 레짐 신뢰도가 낮을 때 새 blend 채택을 늦춘다.
  #   eff_α = 1 - (1 - blend_smoothing_alpha) · clip(confidence / conf_ref, 0, 1)
  #   신뢰도 낮음 → α↑ (관성↑, 가짜 플립 억제) / 높음 → α=blend_smoothing_alpha
  #   신뢰도 = rule_conf·HMM 결합(confidence_method) × (1 - anomaly_penalty·anomaly)
  #   Crisis 면제: raw_blend[Crisis] ≥ crisis_priority_threshold이면 빠른 진입 보존.
  #   2026-06-08 채택: ref=0.3 (tx 4.57→4.04%, Sharpe 0.80→0.84, MaxDD -9.9→-9.4%).
  #   docs/experiment_2026-06-08_confidence_smoothing.md 참조.
  confidence_smoothing:
    enabled: true
    conf_ref: 0.3
  # 비-Crisis 디리스크 코로보레이션 게이트 (옵트인, 레버 C).
  #   포화된 HMM이 단독으로 방어(Slowdown/Stagflation)로 blend를 끌어내릴 때, 매크로(rule)가
  #   위험선호(Goldilocks/Reflation)면 코로보레이션 없는 것으로 보고 방어 질량을 gamma만큼
  #   회수해 rule_regime으로 재배분. Crisis 질량은 절대 감쇠 안 함 + blend[Crisis]>=
  #   crisis_priority_threshold면 게이트 전체 면제(위기 빠른 진입 보존).
  #   docs/experiment_2026-06-09_corroboration_gate.md 검증 후 값 결정.
  corroboration_gate:
    enabled: false
    gamma: 0.0
  # 레짐별 override — Crisis는 빠른 진입이 중요하므로 confirmation 1회·쿨다운 0.
  per_regime:
    Crisis:
      confirmation_count: 1
      cooldown_days: 0
  # Transition phase: 새 confirmed regime 진입 후 N일 동안 Transition 비중 사용.
  # 분류 불확실성 + 시장 변동성이 큰 transition 시점에 risk-off.
  #   0  — 비활성 (현재) — A안 백테스트 결과 over-protection으로 채택 보류
  # 백테스트 결과 (2010~2025): N=7/14/21 모두 Sharpe -0.09~-0.13 열위.
  # 원인: 강세장 진입(Goldilocks/Reflation)의 기회 손실 > 위험 진입 보호 효과.
  # 후속 시도 후보: 위험 레짐 진입에만 적용 (per_regime gating).
  transition_days: 0

# 리밸런싱 파라미터
rebalancing:
  # regime_change_trigger 제거 (R3, 2026-05-30): 확정 레짐 변경 시 drift 밴드를 우회하던
  #   강제 리밸런스. 백테스트(2010-2025)에서 완전 redundant — drift가 주당 ~90% 발동해 비중을
  #   움직이는 레짐 변화는 이미 포섭. on/off Sharpe Δ≤0.001, 리밸 ≤2회 차이.
  regime_change_trigger:      false
  drift_threshold:            0.015  # 계좌 내 drift > 1.5%p 시 리밸런싱 트리거 (sweet spot)
  # 0 = 비활성. force_full(drift/regime_change/drawdown/force)이 이미 per_ticker를 무시하므로
  # 실제 적용 경로는 deferred_buys뿐이었음 — 제거해 일관성 확보. min_order_krw가 잔주문 필터.
  per_ticker_drift_threshold: 0.0    # 개별 종목 이탈 임계 제거 (min_order_krw만으로 필터)
  min_order_krw: 10000
  usd_krw_fallback: 1380.0
  min_rebalance_interval_days: 0     # 쿨다운 없음 (drift > threshold이면 즉시 매매)
  max_run_turnover: 0                # 단일 실행 회전율 상한 (0=무제한) — 6월부터 0.30으로 복구 예정
  max_monthly_turnover: 0            # 월간 누적 회전율 상한 (0=무제한, 매월 1일 자동 초기화) — 6월부터 0.30으로 복구 예정
  usd_cash_min: 0.01                 # USD 계좌 최소 현금 비율 (1%) — 수수료·환전 여유분
  krw_cash_min: 0.01                 # KRW 계좌 최소 현금 비율 (1%) — 수수료·거래 거절 방지
  order_throttle_s: 0.25             # 주문 사이 대기 (초) — KIS rate limit 예방, 0=비활성
  # 유동성 얇은 종목: 매수/매도를 분할하고 미체결 재시도를 확대해 체결률을 높인다.
  # 계기: 468370(TIPS, AUM ~125억) 신규 진입 시 9.5M 단일주문이 호가 깊이 초과로 timeout(2026-06-12).
  illiquid_order_handling:
    "468370":
      max_order_krw: 2000000   # 이 금액 이하로 분할 (약 165주씩)
      max_retries: 15          # 미체결 재시도 횟수 (기본 10)
      price_chase: 0.003       # 재시도당 가격 추격폭 (기본 0.001 = 0.1%)
      retry_interval_s: 40     # 재가격 전 대기(초) (기본 100)

# 리스크 제어
# severe: equity를 floor(10%)까지 축소, 채권·금·현금 유지 — 반등 구간 미스 방지
# moderate: equity 40% 수준으로 축소 (Risk-Off 강제 효과)
# mild: equity 75% 유지
risk:
  # 드로우다운 스케일 제거 (2026-05-30). 실전 발동 0.1%(15년 3일) — 레짐 로테이션이
  # 포트폴리오 -10% 전에 선제 방어해 사실상 죽은 경로였고, vol_targeting과 equity 이중
  # 축소(C1) redundancy. thresholds는 백테스트 토글·참고용으로 보존.
  drawdown_scaling_enabled: false
  drawdown_thresholds:
    mild:             -0.10
    moderate:         -0.20
    severe:           -0.30
    equity_floor_pct:  0.10  # severe 시 equity 최소 10% 유지 (반등 miss 방지)
  equity_asset_classes:
    - equity_etf
    - equity_factor
    - equity_sector
    - equity_individual
    - equity_developed
    - equity_emerging

# T+2 결제 지연 대응
settlement:
  # 버퍼 플로어 제거 (buffer_tickers 비움 → enforce_buffer_floor 미호출).
  # 근거: 모든 레짐 cash 목표 ≥0.08 > 옛 buffer_min 0.07이라 블렌딩 후 469830은
  # 항상 7% 이상 → 플로어가 발동할 일이 없는 redundant 안전망이었음.
  # 드로우다운 축소분 재배치는 run.py에서 ["469830"]로 폴백되어 영향 없음.
  buffer_tickers: []
  buffer_min: 0.0
  synthetic_pairs:
    "TSLA": "379810"   # 나스닥100 (TSLA = NASDAQ100 구성종목)
    "PLTR": "379810"   # 나스닥100 (PLTR = NASDAQ100 구성종목)
    "NVDA": "379810"   # 나스닥100 (NVDA = NASDAQ100 핵심 종목)
    "LLY":  "379800"   # S&P500 (LLY = SPX500, 헬스케어)
    "VTV":  "379800"   # S&P500 (Value subset)
    "AVUV": "379800"   # S&P500 (소형가치 대체재 없음)
    "VEA":  "379800"   # S&P500 (선진 ex-US KRW 대체재 없음, US fallback)
    "VWO":  "379800"   # S&P500 (신흥국 KRW 대체재 없음, US fallback)
    "IEF":  "305080"   # TIGER 미국채10년 (듀레이션 일치)
    "SHY":  "469830"   # SOL 초단기채권 (단기채)
    "DBC":               # broad commodity → 금+WTI 50/50
      "411060": 0.50
      "261220": 0.50
    "DBMF": "411060"   # 금 (CTA 트렌드 헷지 → 전천후 자산)
