# ────────────────────────────────────────────────────────────────────────────
# 동적 자산 배분 — 레짐별 자산군 목표 비중 (합계 = 1.0)
#
# ※ 실제 실행 시에는 HMM 사후 확률로 가중 평균(Continuous Exposure)이 적용된다.
#    이 값은 극단 레짐(확률 100%)일 때의 순수 배분이다.
#
# 포트폴리오 구조:
#   Core 80%     — equity_etf / equity_factor / bond / gold / commodity / managed_futures / cash
#   Satellite 20% — equity_individual (TSLA + PLTR: 장기투자 + 알파)
#
# 자산군 설명:
#   equity_etf        : KODEX S&P500 + 나스닥100 (KRW, 시장 베타)
#   equity_factor     : VTV(Value ETF) (USD, Reflation·금리 상승 수혜)
#   equity_individual : TSLA + PLTR (USD, 고베타 성장주 = Satellite)
#   commodity         : DBC (USD, 인플레 헤지 — Reflation·Stagflation 핵심)
#   managed_futures   : DBMF (USD, CTA — Slowdown·Stagflation·Crisis 방어)
#   bond_usd          : IEF + SHY (USD 중단기채 — Slowdown·Crisis 방어)
#   bond_krw          : TIGER 미국채10년 (KRW — Slowdown·Crisis panic bid)
#   gold              : ACE KRX금현물 (KRW, 전천후 헤지)
#   cash              : SOL 초단기채권 (KRW, Crisis·Stagflation 방어)
# ────────────────────────────────────────────────────────────────────────────

regime_targets:
  # ── Goldilocks: 성장↑ + 유동성↑ (인플레 안정) ──────────────────────────────
  # 가장 Risk-On. cash 축소(15→8), equity_etf 확장(40→42), 해외 분산 추가.
  Goldilocks:          # core 80% | satellite 20%
    equity_etf:        0.42   # S&P500 + 나스닥100 — 광범위 성장 (cash에서 흡수)
    equity_factor:     0.05   # VTV+AVUV 소량
    equity_sector:     0.00
    equity_individual: 0.20   # TSLA+PLTR+NVDA+LLY (4종목 분산)
    equity_developed:  0.03   # VEA — 유럽·일본 분산
    equity_emerging:   0.02   # VWO — 신흥국 분산
    commodity:         0.05
    managed_futures:   0.05
    bond_usd:          0.00
    bond_tips:         0.00   # 인플레 안정 → TIPS 불필요
    bond_krw:          0.00
    gold:              0.10
    cash:              0.08   # 0.15 → 0.08 (Goldilocks 현금 과다 축소)

  # ── Reflation: 성장↑ + 인플레↑ ─────────────────────────────────────────────
  # TIPS + commodity + MF (인플레·트렌드 동반). gold 축소 (Reflation Sharpe 0.01).
  Reflation:           # core 90% | satellite 10%
    equity_etf:        0.22
    equity_factor:     0.08
    equity_sector:     0.07
    equity_individual: 0.10
    equity_developed:  0.02
    equity_emerging:   0.02
    commodity:         0.16
    managed_futures:   0.12   # 0.05 → 0.12 (Sharpe +2.26 1위, max 12%)
    bond_usd:          0.00
    bond_tips:         0.05
    bond_krw:          0.00
    gold:              0.08   # 0.15 → 0.08 (Sharpe 0.01 11위 — 과중 해소)
    cash:              0.08

  # ── Slowdown: 성장↓ (인플레 낮음) ──────────────────────────────────────────
  # 채권·금 방어. bond_tips 추가 (Sharpe +1.19). MF 축소 (+0.07).
  Slowdown:            # core 90% | satellite 10%
    equity_etf:        0.15
    equity_factor:     0.05
    equity_sector:     0.00
    equity_individual: 0.10
    equity_developed:  0.02
    equity_emerging:   0.02
    commodity:         0.05
    managed_futures:   0.05   # 0.12 → 0.05 (Sharpe +0.07 12위)
    bond_usd:          0.00   # 2026-06-11 채권 KRW 통합 — 합성 잔차 제거 (→ bond_krw)
    bond_tips:         0.07   # 0.00 → 0.07 (Sharpe +1.19 3위)
    bond_krw:          0.27   # 0.15 + bond_usd 0.12 (KRW-native)
    gold:              0.14
    cash:              0.08

  # ── Stagflation: 성장↓ + 인플레↑ ───────────────────────────────────────────
  # TIPS + gold + commodity 인플레 방어. equity_factor 보강 (Sharpe +1.34).
  Stagflation:         # core 92% | satellite 8%
    equity_etf:        0.05
    equity_factor:     0.08   # 0.03 → 0.08 (Sharpe +1.34 3위)
    equity_sector:     0.05
    equity_individual: 0.08
    equity_developed:  0.02
    equity_emerging:   0.02
    commodity:         0.18
    managed_futures:   0.07   # 0.12 → 0.07 (Sharpe +0.44 12위)
    bond_usd:          0.00   # 2026-06-11 채권 KRW 통합 (→ bond_krw)
    bond_tips:         0.08
    bond_krw:          0.05   # 0.00 + bond_usd 0.05 (KRW-native)
    gold:              0.18
    cash:              0.14

  # ── Crisis: 유동성 쇼크 ─────────────────────────────────────────────────────
  # equity_etf/bond_tips 추가 (Sharpe 2.85/2.28, 분류 후행 V-shape 보상 활용).
  # MF 제거 (Sharpe -0.48 — 음수). cash·gold 축소.
  Crisis:              # core 95% | satellite 5%
    equity_etf:        0.10   # 0.00 → 0.10 (Sharpe +2.85 2위)
    equity_factor:     0.06   # 0.03 → 0.06
    equity_sector:     0.00
    equity_individual: 0.05
    equity_developed:  0.02
    equity_emerging:   0.02
    commodity:         0.05
    managed_futures:   0.00   # 0.12 → 0.00 (Sharpe -0.48 13위)
    bond_usd:          0.00   # 2026-06-11 채권 KRW 통합 (→ bond_krw)
    bond_tips:         0.10   # 0.00 → 0.10 (Sharpe +2.28 3위, max)
    bond_krw:          0.20   # 0.10 + bond_usd 0.10 (KRW-native)
    gold:              0.12   # 0.15 → 0.12
    cash:              0.28   # 0.36 → 0.28

  # ── Transition: 레짐 전환 직후 N일간 (transition_days, regime_filter 참조) ────
  # 분류 불확실성 + 시장 변동성이 큰 시점 — 보수적 비중으로 risk-off.
  # 안정화 후 본 레짐 비중으로 자동 복귀.
  Transition:          # cash·bond·gold 위주, equity 최소
    equity_etf:        0.15
    equity_factor:     0.03
    equity_sector:     0.00
    equity_individual: 0.05
    equity_developed:  0.01
    equity_emerging:   0.01
    commodity:         0.05
    managed_futures:   0.05
    bond_usd:          0.00   # 2026-06-11 채권 KRW 통합 (→ bond_krw)
    bond_tips:         0.05
    bond_krw:          0.24   # 0.12 + bond_usd 0.12 (KRW-native)
    gold:              0.12
    cash:              0.24

# 자산군 → 종목 매핑 (within-class 상대 비중, 고정)
