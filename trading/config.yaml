# ────────────────────────────────────────────────────────────────────────────
# 동적 자산 배분 — 레짐별 자산군 목표 비중 (합계 = 1.0)
#
# ※ 실제 실행 시에는 HMM 사후 확률로 가중 평균(Continuous Exposure)이 적용된다.
#    이 값은 극단 레짐(확률 100%)일 때의 순수 배분이다.
#
# 포트폴리오 구조:
#   Core 80%     — equity_etf / equity_factor / bond / gold / commodity / managed_futures / cash
#   Satellite 20% — equity_individual (TSLA + PLTR: 장기투자 + 알파)
#
# 자산군 설명:
#   equity_etf        : KODEX S&P500 + 나스닥100 (KRW, 시장 베타)
#   equity_factor     : VTV(Value ETF) (USD, Reflation·금리 상승 수혜)
#   equity_individual : TSLA + PLTR (USD, 고베타 성장주 = Satellite)
#   commodity         : DBC (USD, 인플레 헤지 — Reflation·Stagflation 핵심)
#   managed_futures   : DBMF (USD, CTA — Slowdown·Stagflation·Crisis 방어)
#   bond_usd          : IEF + SHY (USD 중단기채 — Slowdown·Crisis 방어)
#   bond_krw          : TIGER 미국채10년 (KRW — Slowdown·Crisis panic bid)
#   gold              : ACE KRX금현물 (KRW, 전천후 헤지)
#   cash              : SOL 초단기채권 (KRW, Crisis·Stagflation 방어)
# ────────────────────────────────────────────────────────────────────────────

regime_targets:
  # ── Goldilocks: 성장↑ + 유동성↑ (인플레 안정) ──────────────────────────────
  # 가장 Risk-On. Satellite 풀 포지션. 섹터/에너지 불필요. 채권 최소화.
  Goldilocks:          # core 80% | satellite 20%
    equity_etf:        0.40   # KODEX S&P500 + 나스닥100 — 광범위 성장
    equity_factor:     0.05   # VTV+AVUV 소량 (성장 환경에서 Value 기회비용)
    equity_sector:     0.00   # XLE — 에너지 필요 없음
    equity_individual: 0.20   # TSLA+PLTR — Satellite 풀 포지션
    commodity:         0.05   # DBC — 유동성 수혜 소량
    managed_futures:   0.05   # DBMF — 트렌드 소량
    bond_usd:          0.00
    bond_krw:          0.00
    gold:              0.10   # 유동성 + 헤지
    cash:              0.15

  # ── Reflation: 성장↑ + 인플레↑ ─────────────────────────────────────────────
  # 성장주 약점 환경. DBC·XLE·Gold·VTV·AVUV 강화. Satellite 축소.
  Reflation:           # core 90% | satellite 10%
    equity_etf:        0.22   # S&P500 비중 축소 (나스닥 금리 민감)
    equity_factor:     0.08   # VTV+AVUV — Value/소형가치 금리 상승 수혜
    equity_sector:     0.07   # XLE — 에너지 섹터 Reflation 핵심 수혜
    equity_individual: 0.10   # TSLA+PLTR 축소 (금리 상승에 Duration 민감)
    commodity:         0.16   # DBC — Reflation 핵심 자산
    managed_futures:   0.05   # DBMF
    bond_usd:          0.00   # 금리 상승 환경 — 채권 회피
    bond_krw:          0.00
    gold:              0.15   # 인플레 헤지
    cash:              0.17

  # ── Slowdown: 성장↓ (인플레 낮음) ──────────────────────────────────────────
  # 전통적 경기 둔화. 채권·금·DBMF 방어. 섹터/에너지 수요 감소.
  Slowdown:            # core 90% | satellite 10%
    equity_etf:        0.15   # 소량 유지
    equity_factor:     0.05   # VTV+AVUV 방어적 소량
    equity_sector:     0.00   # XLE — 에너지 수요 감소
    equity_individual: 0.10   # Satellite 축소
    commodity:         0.05   # 수요 감소 — 소량만
    managed_futures:   0.12   # DBMF — 하락 추세 추종
    bond_usd:          0.12   # IEF+SHY — 금리 하락 수혜
    bond_krw:          0.15   # TIGER 채권 — 금리 하락 수혜
    gold:              0.14   # 안전자산
    cash:              0.12

  # ── Stagflation: 성장↓ + 인플레↑ ───────────────────────────────────────────
  # 가장 어려운 환경. DBC·XLE·Gold·DBMF·Cash 집중. 장기채 회피.
  Stagflation:         # core 92% | satellite 8%
    equity_etf:        0.05   # 최소 유지
    equity_factor:     0.03   # VTV+AVUV 소량
    equity_sector:     0.05   # XLE — 에너지 Stagflation에서도 버팀
    equity_individual: 0.08   # Satellite 최소 (고밸류에이션 압박)
    commodity:         0.18   # DBC — Stagflation 핵심 승자
    managed_futures:   0.12   # DBMF — 추세추종
    bond_usd:          0.05   # SHY 위주 단기채 소량 (장기채는 인플레 피해)
    bond_krw:          0.00   # 장기채 회피
    gold:              0.18   # 통화가치 방어
    cash:              0.26   # SOL 초단기채 — Duration 회피

  # ── Crisis: 유동성 쇼크 ─────────────────────────────────────────────────────
  # 강제청산·상관관계 붕괴. 현금·초단기채 최대화. Equity 최소.
  Crisis:              # core 95% | satellite 5%
    equity_etf:        0.00
    equity_factor:     0.03   # VTV+AVUV 극소량 (회복 대비)
    equity_sector:     0.00   # XLE — 위기 초반 동반 매도
    equity_individual: 0.05   # Satellite 최소
    commodity:         0.05   # 초기 동반 매도 후 반등 고려
    managed_futures:   0.12   # DBMF — 하락 추세 수혜
    bond_usd:          0.10   # IEF+SHY — panic bid (달러 안전자산)
    bond_krw:          0.10   # TIGER 채권 — panic bid
    gold:              0.15   # 위기 안전자산
    cash:              0.40   # SOL 초단기채 — 유동성 최우선

# 자산군 → 종목 매핑 (within-class 상대 비중, 고정)
asset_routing:
  equity_etf:          # KRW 계좌 전용
    "379800": 0.64
    "379810": 0.36
  equity_factor:       # USD 계좌 전용 — VTV(Large Value) + AVUV(Small Value)
    VTV:  0.60
    AVUV: 0.40
  equity_sector:       # USD 계좌 전용 — XLE(에너지) 100%
    XLE:  1.00
  equity_individual:   # USD 계좌 전용
    TSLA: 0.36
    PLTR: 0.64
  commodity:           # USD 계좌 전용
    DBC:  1.00
  managed_futures:     # USD 계좌 전용
    DBMF: 1.00
  bond_usd:            # USD 계좌 전용
    IEF:  0.58
    SHY:  0.42
  bond_krw:            # KRW 계좌 전용
    "305080": 1.00
  gold:                # KRW 계좌 전용
    "411060": 1.00
  cash:                # KRW 계좌 전용
    "469830": 1.00

# dry-run 또는 계좌 조회 실패 시 사용할 KRW/USD 비율 폴백
account_ratio_fallback:
  usd: 0.30
  krw: 0.70

# ── 자산군별 최대 비중 상한 ──────────────────────────────────────────────────
# 레짐 블렌딩으로 인한 과집중 방지. 초과분은 cash로 이동.
class_max_weight:
  equity_individual: 0.20   # Satellite 20% 상한 — Core/Satellite 구조 유지
  commodity:         0.20   # DBC — Stagflation 20%가 최대
  managed_futures:   0.12   # DBMF — 횡보장 약점 고려
  gold:              0.18   # 전천후 헤지 — 과대 비중 방지

# ── 변동성 타겟팅 ────────────────────────────────────────────────────────────
# 실현 변동성이 목표를 초과하면 equity 비중을 자동 축소 → cash 이동
# floor: 최소 equity 유지율 (1.0 - floor = 최대 축소율)
vol_targeting:
  enabled: true
  target_vol:  0.10        # 연 10% 목표 포트폴리오 변동성
  floor:       0.65        # equity 최대 35% 축소
  equity_asset_classes:
    - equity_etf
    - equity_factor
    - equity_sector
    - equity_individual

# HMM 레짐 앙상블
hmm:
  enabled: true
  lookback_days: 500       # HMM 학습 윈도우 (거래일)
  predict_lookback: 60     # 추론 시 사용할 시퀀스 길이 — 전이 확률 문맥 반영
  min_samples: 100
  override_threshold: 0.60

# 레짐 전환 히스테리시스 필터 (표시·알림 목적 — 실제 비중은 연속 블렌딩 적용)
regime_filter:
  confirmation_count: 3
  cooldown_days: 5
  confidence_threshold: 0.40

# 리밸런싱 파라미터
rebalancing:
  drift_threshold:            0.05   # 계좌 내 drift > 5%p 시 리밸런싱 트리거
  per_ticker_drift_threshold: 0.05   # 개별 종목 목표 대비 ±5% 이탈 시만 주문 생성
  min_order_krw: 10000
  usd_krw_fallback: 1380.0
  min_rebalance_interval_days: 7     # 마지막 리밸런싱 후 최소 7일 쿨다운 (드로우다운 비상 시 무시)

# 리스크 제어
# severe: equity만 0으로 (채권·금·현금 유지) — 바닥에서 전량 현금화 방지
# moderate: equity 40% 수준으로 축소 (Risk-Off 강제 효과)
# mild: equity 75% 유지
risk:
  drawdown_thresholds:
    mild:     -0.10
    moderate: -0.20
    severe:   -0.30
  equity_asset_classes:
    - equity_etf
    - equity_factor
    - equity_sector
    - equity_individual

# T+2 결제 지연 대응
settlement:
  buffer_tickers: ["469830"]
  buffer_min: 0.07
  synthetic_pairs:
    "TSLA": "379810"   # 나스닥100 (TSLA는 NASDAQ100 구성종목)
    "PLTR": "379810"   # 나스닥100 (AI/테크 방향성)
    "VTV":  "379800"   # S&P500 (KRX에 Value ETF 대체재 없음)
    "AVUV": "379800"   # S&P500 (KRX에 소형가치 대체재 없음)
    "XLE":  "261220"   # KODEX WTI원유선물(H) (에너지 섹터 직접 대체)
    "IEF":  "305080"   # TIGER 미국채10년 (만기 일치)
    "SHY":  "469830"   # SOL 초단기채권 (단기채 방향성)
    "DBC":  "261220"   # KODEX WTI원유선물(H) (DBC 에너지 비중 50%+)
    "DBMF": "469830"   # SOL 초단기채권 (CTA 대체재 없음, 현금 차선)
