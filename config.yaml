# ────────────────────────────────────────────────
# 자동 자산 배분 시스템 설정
# ────────────────────────────────────────────────

# 레짐 감지용 시장 데이터 (yfinance)
signal:
  tickers: ["SPY", "^VIX", "TLT", "HYG"]
  lookback_days: 130          # 모멘텀 6M 계산에 필요한 최소 거래일

# KIS 계좌 정의
accounts:
  KRW_1:
    acc_no: "64378890-01"
    currency: KRW
  KRW_2:
    acc_no: "64521213-01"
    currency: KRW
  USD:
    acc_no: "64378890-01"   # KRW_1과 동일 계좌 — USD 포지션 전용
    currency: USD

# 투자 유니버스
universe:
  # ── Equity ETF (KRW) ─────────────────────────────────────────────────────
  "379800":
    name: "KODEX S&P500"
    currency: KRW
    exec_account: KRW_1
    asset_class: equity_etf
  "379810":
    name: "KODEX 나스닥100"
    currency: KRW
    exec_account: KRW_2
    asset_class: equity_etf
  # ── Equity Factor (USD) — Value 팩터 ─────────────────────────────────────
  "VTV":
    name: "Vanguard Value ETF"
    currency: USD
    exec_account: USD
    asset_class: equity_factor
  # ── Equity Individual (USD) — 고베타 성장주 ───────────────────────────────
  "TSLA":
    name: "Tesla"
    currency: USD
    exec_account: USD
    asset_class: equity_individual
  "PLTR":
    name: "Palantir"
    currency: USD
    exec_account: USD
    asset_class: equity_individual
  # ── Bond (USD) ───────────────────────────────────────────────────────────
  "IEF":
    name: "iShares 7-10Y Treasury"
    currency: USD
    exec_account: USD
    asset_class: bond_usd
  "SHY":
    name: "iShares 1-3Y Treasury"
    currency: USD
    exec_account: USD
    asset_class: bond_usd
  # ── Bond (KRW) ──────────────────────────────────────────────────────────
  "305080":
    name: "TIGER 미국채10년"
    currency: KRW
    exec_account: KRW_2
    asset_class: bond_krw
  # ── Gold (KRW) ──────────────────────────────────────────────────────────
  "411060":
    name: "ACE KRX금현물"
    currency: KRW
    exec_account: KRW_1
    asset_class: gold
  # ── Commodities (USD) ────────────────────────────────────────────────────
  "DBC":
    name: "Invesco DB Commodity Index"
    currency: USD
    exec_account: USD
    asset_class: commodity
  # ── Managed Futures (USD) ────────────────────────────────────────────────
  "DBMF":
    name: "iMGP DBi Managed Futures Strategy"
    currency: USD
    exec_account: USD
    asset_class: managed_futures
  # ── Cash (KRW) ──────────────────────────────────────────────────────────
  "469830":
    name: "SOL 초단기채권"
    currency: KRW
    exec_account: KRW_2
    asset_class: cash

# ────────────────────────────────────────────────────────────────────────────
# 동적 자산 배분 — 레짐별 자산군 목표 비중 (합계 = 1.0)
#
# ※ 실제 실행 시에는 HMM 사후 확률로 가중 평균(Continuous Exposure)이 적용된다.
#    이 값은 극단 레짐(확률 100%)일 때의 순수 배분이다.
#
# 자산군 설명:
#   equity_etf        : KODEX S&P500 + 나스닥100 (KRW, 베타 분산)
#   equity_factor     : VTV(Value) (USD, Value 팩터)
#   equity_individual : TSLA + PLTR (USD, 고베타 성장주)
#   commodity         : DBC (USD, 인플레 헤지 — 롤비용 주의)
#   managed_futures   : DBMF (USD, 트렌드 팔로잉 — 횡보장 약점 있음)
#   bond_usd          : IEF + SHY (USD 중단기채)
#   bond_krw          : TIGER 미국채10년 (KRW)
#   gold              : ACE KRX금현물 (KRW, 보조 헤지 — 조건부 자산)
#   cash              : SOL 초단기채권 (KRW)
# ────────────────────────────────────────────────────────────────────────────

regime_targets:
  Risk-On:             # equity 59% | factor 10% | commodity 10% | MF 8% | gold 8% | cash 15%
    equity_etf:        0.38   # KODEX (KRW)
    equity_factor:     0.10   # VTV (USD, Value 팩터)
    equity_individual: 0.11   # TSLA+PLTR (USD, 고베타)
    commodity:         0.10   # DBC (USD)
    managed_futures:   0.08   # DBMF (USD)
    bond_usd:          0.00
    bond_krw:          0.00
    gold:              0.08   # 보조 헤지
    cash:              0.15

  Neutral:             # equity 46% | commodity 9% | MF 9% | bond 9% | gold 10% | cash 17%
    equity_etf:        0.27
    equity_factor:     0.08
    equity_individual: 0.11
    commodity:         0.09
    managed_futures:   0.09
    bond_usd:          0.02
    bond_krw:          0.07
    gold:              0.10
    cash:              0.17

  Risk-Off:            # equity 24% | commodity 7% | MF 10% | bond 22% | gold 15% | cash 22%
    equity_etf:        0.08
    equity_factor:     0.05   # Value는 방어적 — 소량 유지
    equity_individual: 0.11
    commodity:         0.07
    managed_futures:   0.10
    bond_usd:          0.08
    bond_krw:          0.14
    gold:              0.15
    cash:              0.22

  High-Vol:            # equity 11% | commodity 6% | MF 10% | bond 29% | gold 16% | cash 28%
    equity_etf:        0.00
    equity_factor:     0.03   # VTV 소량
    equity_individual: 0.08
    commodity:         0.06
    managed_futures:   0.10
    bond_usd:          0.11
    bond_krw:          0.18
    gold:              0.16
    cash:              0.28

# 자산군 → 종목 매핑 (within-class 상대 비중, 고정)
asset_routing:
  equity_etf:          # KRW 계좌 전용
    "379800": 0.64
    "379810": 0.36
  equity_factor:       # USD 계좌 전용 — VTV 100%
    VTV:  1.00
  equity_individual:   # USD 계좌 전용
    TSLA: 0.36
    PLTR: 0.64
  commodity:           # USD 계좌 전용
    DBC:  1.00
  managed_futures:     # USD 계좌 전용
    DBMF: 1.00
  bond_usd:            # USD 계좌 전용
    IEF:  0.58
    SHY:  0.42
  bond_krw:            # KRW 계좌 전용
    "305080": 1.00
  gold:                # KRW 계좌 전용
    "411060": 1.00
  cash:                # KRW 계좌 전용
    "469830": 1.00

# dry-run 또는 계좌 조회 실패 시 사용할 KRW/USD 비율 폴백
account_ratio_fallback:
  usd: 0.30
  krw: 0.70

# ── 자산군별 최대 비중 상한 ──────────────────────────────────────────────────
# 레짐 블렌딩으로 인한 과집중 방지. 초과분은 cash로 이동.
class_max_weight:
  managed_futures:   0.10   # DBMF — 횡보장 약점, 10% 상한
  equity_individual: 0.12   # TSLA+PLTR — 고베타 집중 방지
  gold:              0.18   # 보조 헤지 역할 — 과대 비중 방지

# ── 변동성 타겟팅 ────────────────────────────────────────────────────────────
# 실현 변동성이 목표를 초과하면 equity 비중을 자동 축소 → cash 이동
# floor: 최소 equity 유지율 (1.0 - floor = 최대 축소율)
vol_targeting:
  enabled: true
  target_vol:  0.10        # 연 10% 목표 포트폴리오 변동성
  floor:       0.65        # equity 최대 35% 축소
  equity_asset_classes:
    - equity_etf
    - equity_factor
    - equity_individual

# HMM 레짐 앙상블
hmm:
  enabled: true
  lookback_days: 500
  min_samples: 100
  override_threshold: 0.60

# 레짐 전환 히스테리시스 필터 (표시·알림 목적 — 실제 비중은 연속 블렌딩 적용)
regime_filter:
  confirmation_count: 3
  cooldown_days: 5
  confidence_threshold: 0.40

# 리밸런싱 파라미터
rebalancing:
  drift_threshold:           0.05   # 전체 drift 합 > 5%p 시 리밸런싱 실행
  per_ticker_drift_threshold: 0.05  # 개별 종목 목표 대비 ±5% 이탈 시만 주문 생성
  min_order_krw: 10000
  usd_krw_fallback: 1380.0

# 리스크 제어
# severe: equity만 0으로 (채권·금·현금 유지) — 바닥에서 전량 현금화 방지
# moderate: equity 40% 수준으로 축소 (Risk-Off 강제 효과)
# mild: equity 75% 유지
risk:
  drawdown_thresholds:
    mild:     -0.10
    moderate: -0.20
    severe:   -0.30
  equity_asset_classes:
    - equity_etf
    - equity_factor
    - equity_individual

# T+2 결제 지연 대응
settlement:
  buffer_tickers: ["469830"]
  buffer_min: 0.07
  synthetic_pairs:
    "TSLA": "379800"
    "PLTR": "379810"
    "VTV":  "379800"   # Value ETF → KODEX S&P500 (임시 브릿지)
    "IEF":  "305080"
    "SHY":  "469830"
    "DBC":  "469830"
    "DBMF": "469830"
