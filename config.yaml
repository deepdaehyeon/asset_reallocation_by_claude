# 레짐 감지용 시장 데이터 (yfinance)
signal:
  tickers: ["SPY", "^VIX", "TLT", "HYG"]
  lookback_days: 130          # 모멘텀 6M 계산에 필요한 최소 거래일

# KIS 계좌 정의
# auth.yaml 의 acc_no 키와 매핑됨
accounts:
  KRW_1:
    acc_no: "64378890-01"
    currency: KRW
  KRW_2:
    acc_no: "64521213-01"
    currency: KRW
  USD:
    acc_no: "64378890-01"   # KRW_1과 동일 계좌 — USD 포지션 전용
    currency: USD

