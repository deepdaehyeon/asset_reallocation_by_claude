# 리밸런싱 파라미터
rebalancing:
  drift_threshold: 0.05     # 5%p 이탈 시 리밸런싱 트리거
  min_order_krw: 10000      # 최소 주문 금액 (KRW 환산)
  usd_krw_fallback: 1380.0  # 환율 API 실패 시 폴백

# 리스크 제어
risk:
  drawdown_thresholds:
    mild:     -0.10   # 비중 × 0.8
    moderate: -0.20   # 비중 × 0.5
    severe:   -0.30   # 비중 × 0.0 (전량 현금화)
